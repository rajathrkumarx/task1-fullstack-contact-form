<!DOCTYPE html>
<html>
<head>
    <title>Modern Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>MainCrafts Technology</h1>
        <p>Java Full Stack Internship - Task 1</p>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Welcome to Our Landing Page</h2>
        <p>We build modern full-stack web applications using Spring Boot.</p>
    </section>

    <!-- Contact Form Section -->
    <section class="contact">
        <h2>Contact Us</h2>

        <form action="http://localhost:8080/contact" method="post">
            
            <input type="text" name="name" placeholder="Your Name" required>
            
            <input type="email" name="email" placeholder="Your Email" required>
            
            <textarea name="message" placeholder="Your Message" required></textarea>
            
            <button type="submit">Send Message</button>
        
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 MainCrafts Technology</p>
    </footer>

</body>
</html>
